name: GoalNexus CI (Parallel)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- Backend Build Job ---
  backend-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0 # Adjust to 8.0 if using LTS
        
    - name: Restore Backend
      run: dotnet restore backend/GoalNexus.Api/GoalNexus.Api.csproj
      
    - name: Build Backend
      run: dotnet build backend/GoalNexus.Api/GoalNexus.Api.csproj --no-restore --configuration Release

  # --- Frontend Build Job ---
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install & Build Frontend
      run: |
        cd frontend
        npm ci
        npm run build

  # --- Infrastructure Validation Job ---
  terraform-ci:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      
    - name: Terraform Init & Validate
      run: |
        cd terraform
        terraform init -backend=false
        terraform validate
