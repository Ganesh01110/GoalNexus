name: GoalNexus CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # --- Backend Build ---
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0 # Adjust to 8.0 if using LTS
        
    - name: Restore Backend
      run: dotnet restore backend/GoalNexus.Api/GoalNexus.Api.csproj
      
    - name: Build Backend
      run: dotnet build backend/GoalNexus.Api/GoalNexus.Api.csproj --no-restore --configuration Release

    # --- Frontend Build ---
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install Frontend Deps
      run: |
        cd frontend
        npm install
        
    - name: Build Frontend
      run: |
        cd frontend
        npm run build

    # --- Infrastructure Validation ---
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      
    - name: Terraform Init & Validate
      run: |
        cd terraform
        terraform init -backend=false
        terraform validate
